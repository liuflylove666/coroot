<svg width="214" height="48" viewBox="0 0 214 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="214" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#101B30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="24" x2="214" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="6" y1="8" x2="36" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="214" height="48" rx="10" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="212.5" height="46.5" rx="9.25" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Observability icon: eye with signal waves -->
  <g transform="translate(14,10)">
    <!-- Eye shape representing observability -->
    <path d="M14 8 C8 8 3 14 3 14 C3 14 8 20 14 20 C20 20 25 14 25 14 C25 14 20 8 14 8 Z" stroke="url(#iconGrad)" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
    <!-- Iris -->
    <circle cx="14" cy="14" r="4.5" fill="url(#iconGrad)"/>
    <!-- Pupil -->
    <circle cx="14" cy="14" r="2" fill="#0B1120"/>
    <!-- Signal arcs on top -->
    <path d="M6 5 A10 10 0 0 1 22 5" stroke="#4ade80" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M2.5 1.5 A14 14 0 0 1 25.5 1.5" stroke="#4ade80" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.2"/>
    <!-- Pulse line below -->
    <polyline points="0,24 5,24 8,20 11,27 14,22 17,24 28,24" stroke="#4ade80" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- "OPS" main title -->
  <text x="48" y="27" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" letter-spacing="2.5" fill="white">OPS</text>

  <!-- Separator -->
  <rect x="104" y="9" width="1.4" height="30" rx="0.7" fill="#4ade80" opacity="0.25"/>

  <!-- "可观测平台" subtitle -->
  <text x="113" y="30" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Source Han Sans CN', system-ui, sans-serif" font-size="16" font-weight="500" letter-spacing="2" fill="#a1b4cc">可观测平台</text>

  <!-- Decorative metric dots on the right -->
  <g opacity="0.2">
    <circle cx="184" cy="28" r="1.2" fill="#4ade80"/>
    <circle cx="190" cy="22" r="1.2" fill="#4ade80"/>
    <circle cx="196" cy="25" r="1.2" fill="#4ade80"/>
    <circle cx="202" cy="18" r="1.2" fill="#4ade80"/>
    <polyline points="184,28 190,22 196,25 202,18" stroke="#4ade80" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
